<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>developer: yataman</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
            font-weight: 700;
        }

        .label {
            color: var(--accent);
            font-weight: 400;
            opacity: 0.8;
        }

        .location {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2.5rem;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .project-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            display: block;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .project-card h2 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--accent);
        }

        .project-card p {
            margin: 0.5rem 0 0;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.6;
        }
    </style>
    <meta name="google-site-verification" content="IqO8PJA4G3MW3pO_Mms7GifCyxyQ3b5LbokFAe0mxaQ" />
</head>
<body>

    <div class="container">
        <header>
            <h1><span class="label">developer:</span> yataman</h1>
            <div class="location"> Tczew / Poland</div>
        </header>

        <section class="projects">
            <a href="./rachunki/index.html" class="project-card">
                <h2>Twoje Rachunki</h2>
                <p>Aplikacja do zarządzania płatnościami.</p>
            </a>

            <a href="./postomat/index.html" class="project-card">
                <h2>Postomat</h2>
                <p>System obsługi przesyłek i logistyki.</p>
            </a>
        </section>

        <footer>
            &copy; 2024 yataman. All rights reserved.
        </footer>
    </div>

</body>
</html>
